<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab Dashboard</title>
  <link rel="stylesheet" href="styles/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">N</div>
      <div class="logo-name">
        New Tab
        <span>Dashboard</span>
      </div>
    </div>

    <ul class="sidebar-nav">
      <li>
        <button class="nav-btn active" data-section="links" title="Quick Links">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101"/>
            <path d="M10.172 13.828a4 4 0 015.656 0l4 4a4 4 0 01-5.656 5.656l-1.102-1.101"/>
          </svg>
          <span>Links</span>
        </button>
      </li>
      <li>
        <button class="nav-btn" data-section="todos" title="To-Do">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12l2 2 4-4"/>
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          <span>To-Do</span>
        </button>
      </li>
      <li>
        <button class="nav-btn" data-section="notes" title="Notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"/>
            <path d="M17.586 3.414a2 2 0 112.828 2.828L12 14.828l-4 1 1-4 8.586-8.414z"/>
          </svg>
          <span>Notes</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-time" id="sidebarTime">
      <div class="time-display" id="timeDisplay">00:00</div>
      <div class="date-display" id="dateDisplay">Mon, Jan 1</div>
    </div>

    <!-- Theme Toggle -->
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <!-- Moon icon (shown in dark mode) -->
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <!-- Sun icon (shown in light mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span class="theme-label" id="themeLabel">Dark</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main" id="main">

    <!-- Links Section -->
    <section class="section active" id="section-links">
      <header class="section-header">
        <h1>Quick Links</h1>
        <div class="header-actions">
          <!-- Layout toggle -->
          <div class="layout-toggle" id="layoutToggle" title="Toggle layout">
            <!-- Grid icon -->
            <button class="layout-btn active" id="layoutGrid" data-layout="grid">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
              </svg>
            </button>
            <!-- List icon -->
            <button class="layout-btn" id="layoutList" data-layout="list">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <line x1="9" y1="6" x2="20" y2="6"/>
                <line x1="9" y1="12" x2="20" y2="12"/>
                <line x1="9" y1="18" x2="20" y2="18"/>
                <circle cx="4.5" cy="6" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="4.5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="4.5" cy="18" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </button>
          </div>
          <button class="btn-add" id="btnAddLink">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Link
          </button>
        </div>
      </header>

      <div class="form-card hidden" id="formLink">
        <input type="text" class="input" id="linkTitle" placeholder="Title" autocomplete="off" />
        <input type="url" class="input" id="linkUrl" placeholder="https://..." autocomplete="off" />
        <div class="form-actions">
          <button class="btn-save" id="saveLinkBtn">Save</button>
          <button class="btn-cancel" id="cancelLinkBtn">Cancel</button>
        </div>
      </div>

      <div class="links-grid" id="linksGrid"></div>
      <p class="empty-state hidden" id="linksEmpty">No links yet. Add your first one.</p>
    </section>

    <!-- Todos Section -->
    <section class="section" id="section-todos">
      <header class="section-header">
        <h1>To-Do</h1>
        <button class="btn-add" id="btnAddTodo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Task
        </button>
      </header>

      <div class="form-card hidden" id="formTodo">
        <input type="text" class="input" id="todoText" placeholder="What needs doing?" autocomplete="off" />
        <div class="form-actions">
          <button class="btn-save" id="saveTodoBtn">Save</button>
          <button class="btn-cancel" id="cancelTodoBtn">Cancel</button>
        </div>
      </div>

      <ul class="todo-list" id="todoList"></ul>
      <p class="empty-state hidden" id="todosEmpty">No tasks. Enjoy the quiet.</p>
    </section>

    <!-- Notes Section -->
    <section class="section" id="section-notes">
      <header class="section-header">
        <h1>Notes</h1>
        <button class="btn-add" id="btnAddNote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Note
        </button>
      </header>

      <div class="form-card hidden" id="formNote">
        <textarea class="input textarea" id="noteText" placeholder="Start writing..." rows="4"></textarea>
        <div class="form-actions">
          <button class="btn-save" id="saveNoteBtn">Save</button>
          <button class="btn-cancel" id="cancelNoteBtn">Cancel</button>
        </div>
      </div>

      <div class="notes-list" id="notesList"></div>
      <p class="empty-state hidden" id="notesEmpty">No notes yet.</p>
    </section>

  </main>

  <script src="scripts/app.js"></script>
</body>
</html>
