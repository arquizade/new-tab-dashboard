<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>New Tab Dashboard</title>
        <link rel="stylesheet" href="/src/styles/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="flex min-h-screen">
        <!-- Sidebar -->
        <nav
            id="sidebar"
            class="sidebar-nav-area w-[216px] min-h-screen bg-surface border-r border-border flex flex-col pt-5 fixed top-0 left-0 bottom-0 z-10 transition-[background,border-color] duration-[180ms] ease-smooth"
        >
            <!-- Logo -->
            <div
                class="sidebar-logo-area flex items-center gap-2.5 px-4 pb-5 border-b border-border mb-3"
            >
                <div
                    class="w-8 h-8 rounded-xl flex items-center justify-center font-mono text-sm font-medium text-accent shrink-0 bg-[var(--accent-soft)] border border-[var(--accent-border)]"
                >
                    N
                </div>
                <div
                    class="text-[13px] font-medium text-text-2 tracking-[0.1px] leading-[1.2]"
                >
                    New Tab
                    <span
                        class="block text-[10px] font-mono text-text-3 font-normal tracking-[0.5px] mt-px"
                        >Dashboard</span
                    >
                </div>
            </div>

            <!-- Nav links -->
            <ul
                class="sidebar-nav-list list-none flex-1 px-2.5 flex flex-col gap-0.5"
            >
                <li>
                    <button
                        class="nav-btn active group w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-transparent border-0 text-text-2 font-sans text-[13px] font-normal cursor-pointer text-left hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms] ease-smooth"
                        data-section="links"
                        title="Quick Links"
                    >
                        <svg
                            class="w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <path
                                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101"
                            />
                            <path
                                d="M10.172 13.828a4 4 0 015.656 0l4 4a4 4 0 01-5.656 5.656l-1.102-1.101"
                            />
                        </svg>
                        <span class="nav-btn-label">Links</span>
                    </button>
                </li>
                <li>
                    <button
                        class="nav-btn group w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-transparent border-0 text-text-2 font-sans text-[13px] font-normal cursor-pointer text-left hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms] ease-smooth"
                        data-section="todos"
                        title="To-Do"
                    >
                        <svg
                            class="w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <path d="M9 12l2 2 4-4" />
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                        </svg>
                        <span class="nav-btn-label">To-Do</span>
                    </button>
                </li>
                <li>
                    <button
                        class="nav-btn group w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-transparent border-0 text-text-2 font-sans text-[13px] font-normal cursor-pointer text-left hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms] ease-smooth"
                        data-section="notes"
                        title="Notes"
                    >
                        <svg
                            class="w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <path
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"
                            />
                            <path
                                d="M17.586 3.414a2 2 0 112.828 2.828L12 14.828l-4 1 1-4 8.586-8.414z"
                            />
                        </svg>
                        <span class="nav-btn-label">Notes</span>
                    </button>
                </li>
            </ul>

            <!-- Clock -->
            <div
                id="sidebarTime"
                class="sidebar-time-area px-[18px] pt-3.5 pb-2.5 border-t border-border mt-auto"
            >
                <div
                    id="timeDisplay"
                    class="font-mono text-2xl font-light text-text-1 tracking-[1.5px] leading-none"
                >
                    00:00
                </div>
                <div
                    id="dateDisplay"
                    class="font-mono text-[10px] text-text-3 mt-[5px] tracking-[0.5px] uppercase"
                >
                    Mon, Jan 1
                </div>
            </div>

            <!-- Footer -->
            <div class="sidebar-footer-area px-2.5 pb-3 pt-2">
                <!-- Theme toggle -->
                <button
                    id="themeToggle"
                    title="Toggle theme"
                    class="theme-btn group w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-transparent border-0 text-text-2 font-sans text-[13px] cursor-pointer text-left hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms] ease-smooth"
                >
                    <svg
                        class="icon-moon w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                    >
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                    <svg
                        class="icon-sun w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                    >
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <span
                        id="themeLabel"
                        class="theme-label text-[13px] text-inherit"
                        >Dark</span
                    >
                </button>

                <div class="h-px bg-border mx-2.5 my-1.5"></div>

                <!-- Export -->
                <button
                    id="btnExport"
                    title="Export all data as JSON"
                    class="nav-btn group w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-transparent border-0 text-text-2 font-sans text-[13px] font-normal cursor-pointer text-left hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms] ease-smooth"
                >
                    <svg
                        class="w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                    >
                        <path d="M12 3v12m0 0l-4-4m4 4l4-4" />
                        <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" />
                    </svg>
                    <span class="btn-export-label">Export backup</span>
                </button>

                <!-- Import -->
                <button
                    id="btnImport"
                    title="Import data from JSON backup"
                    class="nav-btn group w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-transparent border-0 text-text-2 font-sans text-[13px] font-normal cursor-pointer text-left hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms] ease-smooth"
                >
                    <svg
                        class="w-4 h-4 shrink-0 opacity-55 group-hover:opacity-90 transition-opacity duration-[180ms]"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                    >
                        <path d="M12 21V9m0 0l-4 4m4-4l4 4" />
                        <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" />
                    </svg>
                    <span class="btn-import-label">Import backup</span>
                </button>

                <input type="file" id="importFileInput" accept=".json" />

                <!-- Keyboard hint -->
                <div class="mx-3 mt-3 mb-1 flex flex-wrap gap-x-2 gap-y-1">
                    <span
                        class="font-mono text-[10px] text-text-3 tracking-wide"
                        title="Switch to Links"
                    >
                        <kbd
                            class="px-1 py-px bg-surface-3 border border-border rounded text-[9px]"
                            >1</kbd
                        >
                        Links
                    </span>
                    <span
                        class="font-mono text-[10px] text-text-3 tracking-wide"
                        title="Switch to To-Do"
                    >
                        <kbd
                            class="px-1 py-px bg-surface-3 border border-border rounded text-[9px]"
                            >2</kbd
                        >
                        To-Do
                    </span>
                    <span
                        class="font-mono text-[10px] text-text-3 tracking-wide"
                        title="Switch to Notes"
                    >
                        <kbd
                            class="px-1 py-px bg-surface-3 border border-border rounded text-[9px]"
                            >3</kbd
                        >
                        Notes
                    </span>
                    <span
                        class="font-mono text-[10px] text-text-3 tracking-wide"
                        title="Open add form"
                    >
                        <kbd
                            class="px-1 py-px bg-surface-3 border border-border rounded text-[9px]"
                            >A</kbd
                        >
                        Add
                    </span>
                    <span
                        class="font-mono text-[10px] text-text-3 tracking-wide"
                        title="Search links (Links section only)"
                    >
                        <kbd
                            class="px-1 py-px bg-surface-3 border border-border rounded text-[9px]"
                            >/</kbd
                        >
                        Search
                    </span>
                    <span
                        class="font-mono text-[10px] text-text-3 tracking-wide"
                        title="Close form / dismiss"
                    >
                        <kbd
                            class="px-1 py-px bg-surface-3 border border-border rounded text-[9px]"
                            >Esc</kbd
                        >
                        Close
                    </span>
                </div>

                <!-- Import confirm -->
                <div
                    id="importConfirm"
                    class="import-confirm hidden mx-2.5 mt-1.5 mb-0.5 px-3.5 py-3 bg-surface-2 border border-border-mid rounded-xl"
                >
                    <p class="text-[12px] text-text-2 leading-[1.45] mb-2.5">
                        This will replace all your current data. Continue?
                    </p>
                    <div class="flex gap-1.5">
                        <button
                            id="btnConfirmImport"
                            class="flex-1 py-[7px] px-2.5 rounded-full font-sans text-[12px] font-medium cursor-pointer bg-[var(--danger-soft)] border border-[var(--danger-border)] text-danger hover:brightness-125 transition-[filter] duration-[180ms]"
                        >
                            Replace
                        </button>
                        <button
                            id="btnCancelImport"
                            class="flex-1 py-[7px] px-2.5 rounded-full font-sans text-[12px] cursor-pointer bg-transparent border border-border-mid text-text-2 hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms]"
                        >
                            Cancel
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Toast -->
        <div id="toast" class="toast" aria-live="polite"></div>

        <!-- Main content -->
        <main
            id="main"
            class="main-content ml-[216px] flex-1 min-h-screen py-[52px] px-[60px] w-[calc(100%-216px)] min-w-0"
        >
            <!-- ── Links ── -->
            <section class="section active" id="section-links">
                <header class="flex items-center justify-between mb-6 gap-3">
                    <h1
                        class="text-[20px] font-semibold text-text-1 tracking-[-0.3px] whitespace-nowrap shrink-0"
                    >
                        Quick Links
                    </h1>
                    <div class="flex items-center gap-2 shrink-0">
                        <!-- Layout toggle -->
                        <div
                            id="layoutToggle"
                            title="Toggle layout"
                            class="flex items-center bg-surface-3 border border-border rounded-xl p-[3px] gap-0.5"
                        >
                            <button
                                id="layoutGrid"
                                data-layout="grid"
                                class="layout-btn active w-[30px] h-[28px] flex items-center justify-center bg-transparent border-0 rounded-lg text-text-3 cursor-pointer hover:text-text-2 transition-[background,color] duration-[180ms]"
                            >
                                <svg
                                    class="w-3.5 h-3.5"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.75"
                                >
                                    <rect
                                        x="3"
                                        y="3"
                                        width="7"
                                        height="7"
                                        rx="1.5"
                                    />
                                    <rect
                                        x="14"
                                        y="3"
                                        width="7"
                                        height="7"
                                        rx="1.5"
                                    />
                                    <rect
                                        x="3"
                                        y="14"
                                        width="7"
                                        height="7"
                                        rx="1.5"
                                    />
                                    <rect
                                        x="14"
                                        y="14"
                                        width="7"
                                        height="7"
                                        rx="1.5"
                                    />
                                </svg>
                            </button>
                            <button
                                id="layoutList"
                                data-layout="list"
                                class="layout-btn w-[30px] h-[28px] flex items-center justify-center bg-transparent border-0 rounded-lg text-text-3 cursor-pointer hover:text-text-2 transition-[background,color] duration-[180ms]"
                            >
                                <svg
                                    class="w-3.5 h-3.5"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.75"
                                >
                                    <line x1="9" y1="6" x2="20" y2="6" />
                                    <line x1="9" y1="12" x2="20" y2="12" />
                                    <line x1="9" y1="18" x2="20" y2="18" />
                                    <circle
                                        cx="4.5"
                                        cy="6"
                                        r="1.5"
                                        fill="currentColor"
                                        stroke="none"
                                    />
                                    <circle
                                        cx="4.5"
                                        cy="12"
                                        r="1.5"
                                        fill="currentColor"
                                        stroke="none"
                                    />
                                    <circle
                                        cx="4.5"
                                        cy="18"
                                        r="1.5"
                                        fill="currentColor"
                                        stroke="none"
                                    />
                                </svg>
                            </button>
                        </div>
                        <!-- Add link -->
                        <button
                            id="btnAddLink"
                            class="inline-flex items-center gap-1.5 py-[7px] px-4 rounded-full font-sans text-[12px] font-medium leading-none cursor-pointer bg-[var(--accent-soft)] border border-[var(--accent-border)] text-accent hover:brightness-110 transition-[filter] duration-[180ms]"
                        >
                            <svg
                                class="w-3.5 h-3.5 shrink-0"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                            >
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Add Link
                        </button>
                    </div>
                </header>

                <!-- Search bar -->
                <div class="relative mb-4">
                    <svg
                        class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-text-3 pointer-events-none"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input
                        type="text"
                        id="linksSearch"
                        autocomplete="off"
                        placeholder="Search links…"
                        class="w-full py-2 pl-9 pr-8 rounded-xl font-sans text-[13px] text-text-1 outline-none bg-surface border border-border placeholder:text-text-3 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-glow)] transition-[border-color,box-shadow] duration-[180ms]"
                    />
                    <button
                        id="linksClearSearch"
                        title="Clear search"
                        class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 w-5 h-5 flex items-center justify-center rounded-md text-text-3 text-base leading-none hover:bg-surface-3 hover:text-text-1 transition-colors duration-[180ms]"
                    >
                        ×
                    </button>
                </div>

                <!-- Add link form -->
                <div
                    id="formLink"
                    class="hidden flex-col gap-3 p-5 mb-5 rounded-xl bg-surface border border-border-mid shadow-[var(--shadow-md)]"
                >
                    <input
                        type="text"
                        id="linkTitle"
                        autocomplete="off"
                        placeholder="Title"
                        class="w-full py-2.5 px-4 rounded-xl font-sans text-[13px] text-text-1 outline-none bg-bg border border-border-mid placeholder:text-text-3 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-glow)] transition-[border-color,box-shadow] duration-[180ms]"
                    />
                    <input
                        type="url"
                        id="linkUrl"
                        autocomplete="off"
                        placeholder="https://..."
                        class="w-full py-2.5 px-4 rounded-xl font-sans text-[13px] text-text-1 outline-none bg-bg border border-border-mid placeholder:text-text-3 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-glow)] transition-[border-color,box-shadow] duration-[180ms]"
                    />
                    <div class="flex gap-2 pt-1">
                        <button
                            id="saveLinkBtn"
                            class="py-[9px] px-[22px] rounded-full font-sans text-[13px] font-semibold cursor-pointer border-0 bg-accent text-[#111] hover:brightness-105 hover:-translate-y-px active:translate-y-0 transition-[filter,transform] duration-[180ms]"
                        >
                            Save
                        </button>
                        <button
                            id="cancelLinkBtn"
                            class="py-[9px] px-[18px] rounded-full font-sans text-[13px] cursor-pointer bg-transparent border border-border-mid text-text-2 hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms]"
                        >
                            Cancel
                        </button>
                    </div>
                </div>

                <div id="linksGrid" class="links-grid"></div>
                <p
                    id="linksEmpty"
                    class="hidden font-mono text-[12px] text-text-3 text-center py-14 tracking-[0.4px]"
                >
                    No links yet. Add your first one.
                </p>
            </section>

            <!-- ── Todos ── -->
            <section class="section" id="section-todos">
                <header class="flex items-center justify-between mb-6 gap-3">
                    <h1
                        class="text-[20px] font-semibold text-text-1 tracking-[-0.3px] whitespace-nowrap shrink-0"
                    >
                        To-Do
                    </h1>
                    <button
                        id="btnAddTodo"
                        class="inline-flex items-center gap-1.5 py-[7px] px-4 rounded-full font-sans text-[12px] font-medium leading-none cursor-pointer bg-[var(--accent-soft)] border border-[var(--accent-border)] text-accent hover:brightness-110 transition-[filter] duration-[180ms]"
                    >
                        <svg
                            class="w-3.5 h-3.5 shrink-0"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                        >
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Add Task
                    </button>
                </header>

                <!-- Add todo form -->
                <div
                    id="formTodo"
                    class="hidden flex-col gap-3 p-5 mb-5 rounded-xl bg-surface border border-border-mid shadow-[var(--shadow-md)]"
                >
                    <input
                        type="text"
                        id="todoText"
                        autocomplete="off"
                        placeholder="What needs doing?"
                        class="w-full py-2.5 px-4 rounded-xl font-sans text-[13px] text-text-1 outline-none bg-bg border border-border-mid placeholder:text-text-3 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-glow)] transition-[border-color,box-shadow] duration-[180ms]"
                    />
                    <div class="flex gap-2 pt-1">
                        <button
                            id="saveTodoBtn"
                            class="py-[9px] px-[22px] rounded-full font-sans text-[13px] font-semibold cursor-pointer border-0 bg-accent text-[#111] hover:brightness-105 hover:-translate-y-px active:translate-y-0 transition-[filter,transform] duration-[180ms]"
                        >
                            Save
                        </button>
                        <button
                            id="cancelTodoBtn"
                            class="py-[9px] px-[18px] rounded-full font-sans text-[13px] cursor-pointer bg-transparent border border-border-mid text-text-2 hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms]"
                        >
                            Cancel
                        </button>
                    </div>
                </div>

                <ul id="todoList" class="list-none flex flex-col gap-1.5"></ul>
                <p
                    id="todosEmpty"
                    class="hidden font-mono text-[12px] text-text-3 text-center py-14 tracking-[0.4px]"
                >
                    No tasks. Enjoy the quiet.
                </p>
            </section>

            <!-- ── Notes ── -->
            <section class="section" id="section-notes">
                <header class="flex items-center justify-between mb-6 gap-3">
                    <h1
                        class="text-[20px] font-semibold text-text-1 tracking-[-0.3px] whitespace-nowrap shrink-0"
                    >
                        Notes
                    </h1>
                    <button
                        id="btnAddNote"
                        class="inline-flex items-center gap-1.5 py-[7px] px-4 rounded-full font-sans text-[12px] font-medium leading-none cursor-pointer bg-[var(--accent-soft)] border border-[var(--accent-border)] text-accent hover:brightness-110 transition-[filter] duration-[180ms]"
                    >
                        <svg
                            class="w-3.5 h-3.5 shrink-0"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                        >
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        New Note
                    </button>
                </header>

                <!-- Add note form -->
                <div
                    id="formNote"
                    class="hidden flex-col gap-3 p-5 mb-5 rounded-xl bg-surface border border-border-mid shadow-[var(--shadow-md)]"
                >
                    <textarea
                        id="noteText"
                        rows="4"
                        placeholder="Start writing..."
                        class="w-full py-2.5 px-4 rounded-xl font-sans text-[13px] text-text-1 outline-none resize-y min-h-24 leading-[1.65] bg-bg border border-border-mid placeholder:text-text-3 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-glow)] transition-[border-color,box-shadow] duration-[180ms]"
                    ></textarea>
                    <div class="flex gap-2 pt-1">
                        <button
                            id="saveNoteBtn"
                            class="py-[9px] px-[22px] rounded-full font-sans text-[13px] font-semibold cursor-pointer border-0 bg-accent text-[#111] hover:brightness-105 hover:-translate-y-px active:translate-y-0 transition-[filter,transform] duration-[180ms]"
                        >
                            Save
                        </button>
                        <button
                            id="cancelNoteBtn"
                            class="py-[9px] px-[18px] rounded-full font-sans text-[13px] cursor-pointer bg-transparent border border-border-mid text-text-2 hover:bg-surface-3 hover:text-text-1 transition-[background,color] duration-[180ms]"
                        >
                            Cancel
                        </button>
                    </div>
                </div>

                <div id="notesList" class="flex flex-col gap-2.5"></div>
                <p
                    id="notesEmpty"
                    class="hidden font-mono text-[12px] text-text-3 text-center py-14 tracking-[0.4px]"
                >
                    No notes yet.
                </p>
            </section>
        </main>

        <script type="module" src="/src/app.ts"></script>
    </body>
</html>
